# 리포지토리 루트에는 문서만 있고 실제 앱은 frontend/ 안에 있으므로
# base를 frontend로 잡는다. command와 publish는 base 기준 상대 경로다.
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# 지금은 라우터가 없어 불필요하지만, 나중에 vue-router를 붙이면
# 새로고침 시 404가 나는 걸 막아준다.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
