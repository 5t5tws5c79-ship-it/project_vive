<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>무드 플레이어 — 1×3 위젯</title>
<style>
  :root{ --bg:#14161c; --panel:#1c1f28; --panel2:#232634; --line:#303444; --text:#e7e9f0; --dim:#9aa0b4; --mood:#6aa9c9; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);overflow-x:hidden;
    font-family:"Pretendard","Malgun Gothic",system-ui,sans-serif;line-height:1.45}
  .wrap{max-width:860px;margin:0 auto;padding:22px 16px}
  .title{font-size:14px;color:var(--dim);margin-bottom:10px}

  .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  button{font:inherit;color:var(--text);background:var(--panel2);border:1px solid var(--line);
    border-radius:9px;padding:7px 12px;cursor:pointer}
  button:hover{border-color:var(--mood)}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{border:0;border-radius:0;background:transparent}
  .seg button.on{background:var(--mood);color:#0c0e13}
  .next{background:var(--mood);color:#0c0e13;border:0;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;background:#5a6;vertical-align:middle}
  .dot.off{background:#a55}
  .small{font-size:12px;color:var(--dim)}

  /* 1×3 플레이어 */
  .player{position:relative;display:grid;grid-template-columns:minmax(110px,140px) minmax(0,1fr) minmax(150px,200px);gap:0;
    border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--panel);min-height:120px;width:100%;max-width:100%}
  .tint{position:absolute;inset:0;background:var(--mood);opacity:.20;transition:background-color 1.1s ease;pointer-events:none}
  .cell{position:relative;z-index:1;min-width:0;padding:16px 18px;display:flex;flex-direction:column;justify-content:center}
  .cell.mood{border-right:1px solid rgba(255,255,255,.06)}
  .cap{font-size:11px;letter-spacing:.05em;color:var(--dim);text-transform:uppercase}
  .moodlabel{font-size:clamp(24px,4.5vw,34px);font-weight:800;color:var(--mood);line-height:1.05;margin-top:2px}
  .tag{display:inline-block;font-size:10px;border-radius:5px;padding:1px 6px;margin-top:8px;width:fit-content}
  .tag.llm{background:#2a3550;color:#9fc0ff;border:1px solid #3a4a70}
  .tag.rule{background:#3a2f2a;color:#e0b58f;border:1px solid #5a453a}
  .nowplay{font-size:14px;color:var(--mood);font-weight:600;overflow-wrap:anywhere}
  .near{font-size:13px;color:var(--text);margin-top:4px;overflow-wrap:anywhere}
  .reason{font-size:12.5px;color:var(--dim);font-style:italic;margin-top:6px;min-height:17px;overflow-wrap:anywhere}
  .cell.ctrl{align-items:stretch;gap:8px}
  .ctrlrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .ctrlrow button{flex:0 0 auto}
  .ctrlrow input[type=range]{flex:1 1 60px;min-width:0;accent-color:var(--mood)}
  .status{font-size:12px;color:var(--dim)}
  .pulse{width:9px;height:9px;border-radius:50%;background:var(--mood);display:inline-block;margin-right:6px}
  .pulse.live{animation:p 1.5s ease-out infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(255,255,255,.25)}100%{box-shadow:0 0 0 11px rgba(255,255,255,0)}}

  .keyrow{margin-top:12px}
  input[type=password]{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:6px 10px;min-width:0;flex:1 1 180px;font:inherit}
  .note{font-size:12px;color:#d8b978;margin-top:8px;min-height:16px}
  .gate{position:fixed;inset:0;background:rgba(10,11,15,.92);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:10}
  .gate button{font-size:18px;padding:14px 28px;border-radius:12px;background:var(--mood);color:#0c0e13;border:0}
  @media(max-width:720px){ .player{grid-template-columns:1fr} .cell.mood{border-right:0;border-bottom:1px solid rgba(255,255,255,.06)} }
</style>
</head>
<body>
<div class="gate" id="gate">
  <div style="font-size:15px;color:#cfd3e0">위치 기반 무드 플레이어 · 실제 음악 재생 · 볼륨 확인</div>
  <button id="startBtn">▶ 시작</button>
  <div class="small" id="gateNote"></div>
</div>

<div class="wrap">
  <div class="title">무드 플레이어 — 1×3 위젯 (제품 형태 + 발표 모드)</div>

  <div class="bar">
    <div class="seg">
      <button id="mDemo" class="on">🎬 발표: 가상 산책</button>
      <button id="mGps">📍 실시간 GPS (90s)</button>
    </div>
    <button class="next" id="nextStep">다음 장소 →</button>
    <span class="small" id="stepInfo"></span>
    <span class="small" id="keyStatus" style="margin-left:auto"><span class="dot off"></span>키 확인 중…</span>
  </div>

  <div class="player" id="player">
    <div class="tint" id="tint"></div>
    <div class="cell mood">
      <div class="cap">현재 무드</div>
      <div class="moodlabel" id="moodLabel">—</div>
      <span class="tag rule" id="tag" style="display:none"></span>
    </div>
    <div class="cell ctx">
      <div class="nowplay" id="nowPlay">▶ 시작을 누르세요</div>
      <div class="near" id="near"></div>
      <div class="reason" id="reason"></div>
    </div>
    <div class="cell ctrl">
      <div class="ctrlrow">
        <span class="pulse" id="pulse"></span>
        <button id="playBtn">▶</button>
        <button id="nextTrack">⏭</button>
        <input type="range" id="vol" min="0" max="100" value="85" />
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="keyrow bar">
    <span class="small">LLM 키</span>
    <input type="password" id="key" placeholder="config.js 자동 주입 / 없으면 붙여넣기" />
    <button id="applyKey">적용</button>
  </div>
  <div class="note" id="note"></div>
  <div class="small" style="margin-top:14px;line-height:1.7">
    장소: 한국관광공사 TourAPI(공공누리 3유형) · 음악(기본): 로열티프리 SoundHelix → 배포 시 R2 URL 교체(audio.js)<br>
    지도팀 연결: <code>window.MoodPlayer.setLocation(lat,lng,name)</code> 로 위치 주입 · <code>window.MoodPlayer.onMood = res=>{...}</code> 로 무드 수신
  </div>

  <audio id="a0" preload="none"></audio>
  <audio id="a1" preload="none"></audio>
</div>

<script src="./config.js"></script>
<script src="./poi.js"></script>
<script src="./audio.js"></script>
<script src="./engine.js"></script>
<script src="./player-audio.js"></script>
<script>
const E = window.MoodEngine, POI = window.POI || [];
const DEMO_ROUTE = [
  {name:"은평·진관사길", lat:37.6384, lng:126.9463},
  {name:"성수·서울숲",   lat:37.5445, lng:127.0557},
  {name:"인사동·대학로", lat:37.5805, lng:127.0024},
  {name:"압구정·강남",   lat:37.5270, lng:127.0276},
  {name:"남산·한강길",   lat:37.5538, lng:127.0166},
];
let player=null, mode="demo", demoIdx=0, loc=null, near=[], curMoodId=null, curMusicMood=null,
    lastRes=null, playing=false, analyzing=false, pollTimer=null, cdTimer=null, pollLeft=90;

function getKey(){ const el=document.getElementById("key"); const v=el&&el.value.trim(); return v||window.OPENAI_KEY||""; }
function setNote(t){ document.getElementById("note").textContent=t||""; }

function setMoodMusic(id){
  const a=window.MOOD_AUDIO&&window.MOOD_AUDIO[id];
  if(!a||!a.urls||!a.urls.length){ setNote("무드 '"+id+"' 음원 URL 없음(audio.js)"); return; }
  curMusicMood=id; player.crossfade(a.urls[0]); render();
}
function nextTrack(){ if(!curMusicMood)return; const a=window.MOOD_AUDIO[curMusicMood]; if(!a.urls.length)return;
  a._i=((a._i||0)+1)%a.urls.length; player.crossfade(a.urls[a._i]); }

function applyMood(res){
  lastRes=res; curMoodId=res.moodId;
  const m=E.MOODS[res.moodId];
  document.getElementById("tint").style.backgroundColor=m.color;
  document.documentElement.style.setProperty("--mood",m.color);
  render();
  if(playing && res.moodId!==curMusicMood) setMoodMusic(res.moodId);
  if(window.MoodPlayer && typeof window.MoodPlayer.onMood==="function"){ try{ window.MoodPlayer.onMood(res); }catch(e){} }
}
async function updateLocation(l){
  loc=l; near=E.nearby(POI,loc,5); const hour=E.kstHour();
  const key=getKey();
  if(key && navigator.onLine){
    analyzing=true; render();                    // 현재 무드/음악 유지 · "분석 중"만 표시
    const res=await E.inferMood(near,hour,key);   // LLM 주 → 실패 시 내부에서 규칙
    analyzing=false; applyMood(res);
  } else {
    applyMood(E.ruleMood(near,hour));            // 키 없음/오프라인일 때만 규칙
  }
}

function render(){
  const m=curMoodId?E.MOODS[curMoodId]:null;
  document.getElementById("moodLabel").textContent=m?m.label:"—";
  document.getElementById("nowPlay").textContent=curMusicMood?("♪ "+(window.MOOD_AUDIO[curMusicMood].label||curMusicMood)):(playing?"음원 준비 중…":"▶ 시작을 누르세요");
  if(near.length){
    document.getElementById("near").textContent="근처: "+near[0].title+(near.length>1?` 외 ${near.length-1}곳`:"");
  }
  document.getElementById("reason").textContent = analyzing?"무드 분석 중…(LLM)":(lastRes?lastRes.reason:"");
  const tag=document.getElementById("tag");
  if(lastRes){ tag.style.display="inline-block"; tag.className="tag "+(lastRes.decidedBy==="llm"?"llm":"rule");
    tag.textContent=(lastRes.decidedBy==="llm"?"LLM":"규칙")+` ${(lastRes.confidence*100||0).toFixed(0)}%`; }
  document.getElementById("playBtn").textContent=playing?"⏸":"▶";
  document.getElementById("pulse").classList.toggle("live",playing);
  // 상태줄
  if(mode==="demo"){ document.getElementById("status").textContent=loc?`가상 위치: ${loc.name}`:""; }
  else { document.getElementById("status").textContent=`다음 폴링 ${pollLeft}s`; }
  document.getElementById("stepInfo").textContent = mode==="demo" ? `${demoIdx+1}/${DEMO_ROUTE.length} · ${DEMO_ROUTE[demoIdx].name}` : "";
  document.getElementById("nextStep").style.display = mode==="demo" ? "" : "none";
  const hasKey=!!getKey();
  document.getElementById("keyStatus").innerHTML=`<span class="dot ${hasKey?'':'off'}"></span>${hasKey?"LLM 켜짐":"규칙 폴백"}`;
}

/* 모드 */
function stopTimers(){ if(pollTimer){clearInterval(pollTimer);pollTimer=null;} if(cdTimer){clearInterval(cdTimer);cdTimer=null;} }
function startDemo(){ stopTimers(); mode="demo"; demoIdx=0; document.getElementById("mDemo").classList.add("on"); document.getElementById("mGps").classList.remove("on");
  gotoStep(0); }
function gotoStep(i){ demoIdx=(i+DEMO_ROUTE.length)%DEMO_ROUTE.length; const s=DEMO_ROUTE[demoIdx]; updateLocation({lat:s.lat,lng:s.lng,name:s.name,source:"demo"}); }
function startGps(){ stopTimers(); mode="gps"; document.getElementById("mGps").classList.add("on"); document.getElementById("mDemo").classList.remove("on"); render();
  poll(); pollTimer=setInterval(poll,90000); pollLeft=90; cdTimer=setInterval(()=>{ pollLeft=Math.max(0,pollLeft-1); render(); },1000); }
function poll(){ pollLeft=90;
  if(!navigator.geolocation){ setNote("이 브라우저는 위치 미지원"); return; }
  navigator.geolocation.getCurrentPosition(
    p=>{ setNote(""); updateLocation({lat:p.coords.latitude,lng:p.coords.longitude,name:"내 위치",source:"gps"}); },
    e=>{ setNote("GPS 불가(발표장에선 흔함): "+e.message+" — 발표는 '가상 산책' 사용"); }); }

/* 재생 */
function play(){
  playing=true;
  if(curMoodId && curMoodId!==curMusicMood) setMoodMusic(curMoodId); // 멈춘 사이 무드가 바뀌었으면 새 곡
  else if(curMusicMood) player.resume();                             // 아니면 이어재생
  else if(curMoodId) setMoodMusic(curMoodId);                        // 첫 재생
  render();
}
function pause(){ playing=false; player.pause(); render(); }

/* 외부(지도팀) 연결부 */
window.MoodPlayer = {
  setLocation(lat,lng,name){ updateLocation({lat,lng,name:name||"외부",source:"external"}); },
  onMood: null,
};

/* 초기화 */
function build(){
  player=window.CrossfadePlayer(document.getElementById("a0"),document.getElementById("a1"));
  document.getElementById("mDemo").onclick=()=>startDemo();
  document.getElementById("mGps").onclick=()=>startGps();
  document.getElementById("nextStep").onclick=()=>gotoStep(demoIdx+1);
  document.getElementById("playBtn").onclick=()=>playing?pause():play();
  document.getElementById("nextTrack").onclick=()=>nextTrack();
  document.getElementById("vol").oninput=e=>player.setVolume(Number(e.target.value));
  document.getElementById("applyKey").onclick=()=>{ render(); if(loc)updateLocation(loc); };
  if(window.OPENAI_KEY) document.getElementById("key").value=window.OPENAI_KEY;
  document.getElementById("gateNote").textContent=getKey()?"LLM 켜짐 — 장소별 실시간 추론":"키 없음 — 규칙 폴백(정상)";
  gotoStep(0);  // 시작 전 첫 위치 무드 미리 계산(무음)
}
document.getElementById("startBtn").onclick=()=>{ document.getElementById("gate").style.display="none"; play(); };
build();
</script>
</body>
</html>
